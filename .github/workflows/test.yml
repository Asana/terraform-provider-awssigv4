# Builds the provider, runs go vet + go test, and verifies that the generated
# docs/ tree is current. If `go generate` produces a diff, the job fails and
# the contributor is told how to fix it locally.
name: Check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # Use the latest 1.25.x so both go.mod files are satisfied.
          # `go-version-file: go.mod` installs only the *minimum* requested
          # version, which leaves tools/go.mod (which requires a newer patch)
          # unable to build.
          go-version: '1.25.x'
          cache: true
      # tfplugindocs auto-downloads the Terraform CLI if needed, but
      # tools/tools.go also runs `terraform fmt` against examples/, which
      # does need a real `terraform` on PATH. setup-terraform provides it.
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Regenerate docs
        run: cd tools && go generate ./...

      - name: Verify generated files are up to date
        run: |
          # `git add -A` so both modifications and new files count.
          git add -A
          if ! git diff --cached --exit-code; then
            echo "::error::Generated files are out of date. Run 'cd tools && go generate ./...' locally and commit the result." >&2
            exit 1
          fi
